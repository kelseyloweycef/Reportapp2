<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Assistant Pro - All-in-One Reporting</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: { school: { blue: '#0f172a', lightBlue: '#1e3a8a', red: '#dc2626' } }
          }
        }
      }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 text-slate-800 antialiased">
    
    <div id="root"></div>

    <script type="text/babel" data-presets="typescript,react">
        const { useState, useEffect, useRef } = React;

        // --- 1. FIREBASE CONFIGURATION (Verified) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBzIP_EWP8o73U6W0xfeTFVriWopjzgrCE",
            authDomain: "reports-shared-app.firebaseapp.com",
            projectId: "reports-shared-app",
            storageBucket: "reports-shared-app.firebasestorage.app",
            messagingSenderId: "158065703096",
            appId: "1:158065703096:web:160fc5d53253d63eea5c4d",
            measurementId: "G-QECHCQCZ0C"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        auth.signInAnonymously().catch(err => console.error("Auth Error:", err));

        const SHARED_DOC_REF = db.collection('app_data').doc('master_bank');

        // --- CONSTANTS ---
        const LEVELS = {
            HPL: ["Collaboration/Empathy", "Agile", "Hard Working"],
            Standard: ["Excellent", "Good", "Average", "Poor"]
        };
        
        // --- ICONS ---
        const Icon = ({ path, className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{path}</svg>;
        const Check = ({ className }) => <Icon className={className} path={<polyline points="20 6 9 17 4 12"/>} />;
        const User = ({ className }) => <Icon className={className} path={<><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>} />;
        const Trash = ({ className }) => <Icon className={className} path={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></>} />;
        const Plus = ({ className }) => <Icon className={className} path={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />;

        // --- UI COMPONENTS ---

        const CompactSelector = ({ label, categoryId, levels, optionsMap, value, onChange, onAddComment }) => {
            const [selectedLevel, setSelectedLevel] = useState(null);
            const [newVal, setNewVal] = useState("");

            const currentOptions = (selectedLevel && optionsMap[selectedLevel]) || [];

            return (
                <div className="bg-white border border-slate-200 rounded-lg p-3 shadow-sm hover:border-school-lightBlue transition-colors">
                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">{label}</label>
                    
                    <div className="flex flex-wrap gap-1 mb-3">
                        {levels.map(l => (
                            <button 
                                key={l} 
                                onClick={() => setSelectedLevel(l)}
                                className={`px-2 py-1 text-[10px] font-bold rounded border ${selectedLevel === l ? 'bg-school-lightBlue text-white border-school-lightBlue' : 'bg-slate-50 text-slate-600 border-slate-200'}`}
                            >
                                {l}
                            </button>
                        ))}
                    </div>

                    {selectedLevel && (
                        <div className="space-y-2 animate-in">
                            <select 
                                className="w-full p-2 text-xs border rounded bg-slate-50 outline-none"
                                onChange={(e) => onChange(value ? value + " " + e.target.value : e.target.value)}
                                value=""
                            >
                                <option value="">-- Choose {selectedLevel} --</option>
                                {currentOptions.map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
                            </select>
                            <div className="flex gap-1">
                                <input 
                                    className="flex-1 p-1 text-xs border rounded bg-blue-50/50" 
                                    placeholder="Add new comment..." 
                                    value={newVal} 
                                    onChange={e=>setNewVal(e.target.value)} 
                                />
                                <button 
                                    onClick={() => { if(newVal) onAddComment(categoryId, selectedLevel, newVal); setNewVal(""); }}
                                    className="px-2 bg-green-600 text-white rounded text-[10px] font-bold"
                                >
                                    Add
                                </button>
                            </div>
                        </div>
                    )}
                    
                    <div className="mt-2 flex items-start gap-2 group">
                        <textarea 
                            className="flex-1 p-2 text-xs bg-slate-50 border rounded text-slate-700 italic h-12 resize-none overflow-y-auto"
                            value={value || ""}
                            readOnly
                            placeholder="Comments will appear here..."
                        />
                        <button onClick={() => onChange("")} className="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><Trash className="w-4 h-4"/></button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [students, setStudents] = useState([]);
            const [namesInput, setNamesInput] = useState("");
            const [subject, setSubject] = useState("");
            const [customBank, setCustomBank] = useState({});
            const [classData, setClassData] = useState({}); // { studentName: { catId: "comment" } }
            const [activeCategories] = useState([
                { id: "HPL", label: "HPL Skills", levels: LEVELS.HPL },
                { id: "Language", label: "Language & Lit", levels: LEVELS.Standard },
                { id: "Assessment", label: "Assessment", levels: LEVELS.Standard },
                { id: "Homework", label: "Homework", levels: LEVELS.Standard },
                { id: "Improvement", label: "Improvement", levels: LEVELS.Standard }
            ]);
            const [isConnected, setIsConnected] = useState(false);

            useEffect(() => {
                const unsub = SHARED_DOC_REF.onSnapshot(doc => {
                    if (doc.exists) {
                        setCustomBank(doc.data().customBank || {});
                        setIsConnected(true);
                    }
                });
                return () => unsub();
            }, []);

            const handleStart = () => {
                const list = namesInput.split('\n').map(n => n.trim()).filter(n => n !== "");
                if (!list.length || !subject) return alert("Select subject and enter names.");
                setStudents(list);
                // Initialize classData for each student
                const initData = {};
                list.forEach(s => initData[s] = {});
                setClassData(initData);
            };

            const handleAddCommentToDB = (catId, level, text) => {
                const newBank = JSON.parse(JSON.stringify(customBank));
                const key = `${subject}::Global`;
                if (!newBank[key]) newBank[key] = {};
                if (!newBank[key][catId]) newBank[key][catId] = {};
                if (!newBank[key][catId][level]) newBank[key][catId][level] = [];
                
                if (!newBank[key][catId][level].includes(text)) {
                    newBank[key][catId][level].push(text);
                    SHARED_DOC_REF.update({ customBank: newBank });
                }
            };

            const updateStudentData = (student, catId, text) => {
                setClassData(prev => ({
                    ...prev,
                    [student]: { ...prev[student], [catId]: text }
                }));
            };

            const generateReport = () => {
                let out = "";
                students.forEach(s => {
                    out += `${s.toUpperCase()}\n`;
                    activeCategories.forEach(cat => {
                        if (classData[s]?.[cat.id]) out += `• ${classData[s][cat.id]}\n`;
                    });
                    out += `\n-----------------------------------\n\n`;
                });
                const blob = new Blob([out], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `${subject}_Reports.txt`; a.click();
            };

            const isSetup = students.length === 0;

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <div className="bg-school-blue text-white p-6 shadow-lg border-b-4 border-school-lightBlue">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-black tracking-tighter">REPORT ASSISTANT v2</h1>
                                <p className="text-[10px] font-bold text-blue-300 uppercase tracking-widest">Database: reports-shared-app</p>
                            </div>
                            <div className={`px-3 py-1 rounded-full text-[10px] font-black border ${isConnected ? 'bg-green-500/20 text-green-400 border-green-500/50' : 'bg-red-500/20 text-red-400 border-red-500/50'}`}>
                                {isConnected ? '● SYNC ACTIVE' : '○ CONNECTING'}
                            </div>
                        </div>
                    </div>

                    <main className="max-w-6xl mx-auto p-4 sm:p-6 mt-4">
                        {isSetup ? (
                            <div className="bg-white rounded-2xl shadow-xl p-8 border border-slate-200 animate-in">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="space-y-4">
                                        <h2 className="text-xl font-extrabold text-slate-800">1. Setup Session</h2>
                                        <input 
                                            className="w-full p-4 border rounded-xl bg-slate-50 font-bold focus:ring-2 ring-school-lightBlue outline-none"
                                            placeholder="Enter Subject (e.g. IB History)"
                                            value={subject}
                                            onChange={e=>setSubject(e.target.value)}
                                        />
                                        <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                                            <p className="text-xs text-blue-700 leading-relaxed font-medium">This app uses a single-student workflow. You will select all 5 categories for one student, then click "Complete" to move to the next.</p>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <h2 className="text-xl font-extrabold text-slate-800">2. Student Roster</h2>
                                        <textarea 
                                            className="w-full h-48 p-4 border rounded-xl bg-slate-50 focus:ring-2 ring-school-lightBlue outline-none resize-none"
                                            placeholder="Enter student names (one per line)..."
                                            value={namesInput}
                                            onChange={e=>setNamesInput(e.target.value)}
                                        />
                                        <button 
                                            onClick={handleStart}
                                            className="w-full bg-school-blue text-white py-4 rounded-xl font-black uppercase tracking-widest hover:bg-slate-800 transition shadow-lg shadow-blue-900/20"
                                        >
                                            Begin Reporting Cycle
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-12">
                                <div className="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-school-lightBlue text-white p-2 rounded-lg"><Library className="w-5 h-5"/></div>
                                        <div>
                                            <h3 className="font-black text-slate-800 leading-none">{subject}</h3>
                                            <p className="text-[10px] text-slate-400 font-bold uppercase mt-1">{students.length} Students in queue</p>
                                        </div>
                                    </div>
                                    <button onClick={generateReport} className="bg-green-600 text-white px-6 py-2 rounded-lg font-black text-xs hover:bg-green-700 transition flex items-center gap-2 shadow-lg shadow-green-900/20">
                                        <Check className="w-4 h-4"/> FINISH & DOWNLOAD ALL
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 gap-12">
                                    {students.map((student, sIdx) => {
                                        const isComplete = Object.keys(classData[student] || {}).length >= 3; // Highlight if at least 3 cats selected

                                        return (
                                            <div key={student} className={`bg-white rounded-3xl shadow-xl border-2 transition-all ${isComplete ? 'border-green-200 ring-4 ring-green-50' : 'border-slate-100'}`}>
                                                {/* Student Banner */}
                                                <div className="bg-slate-800 p-6 rounded-t-[22px] flex justify-between items-center">
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center text-white font-black text-xl border border-white/20">
                                                            {sIdx + 1}
                                                        </div>
                                                        <div>
                                                            <h3 className="text-xl font-black text-white leading-none uppercase tracking-tight">{student}</h3>
                                                            <p className="text-blue-300 text-[10px] font-bold mt-1 uppercase tracking-widest">Reporting Progress: {Object.keys(classData[student] || {}).length} / 5</p>
                                                        </div>
                                                    </div>
                                                    {isComplete && <div className="bg-green-500 text-white px-3 py-1 rounded-full text-[10px] font-black animate-pulse">READY</div>}
                                                </div>

                                                {/* All 5 Categories Selection Grid */}
                                                <div className="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                                    {activeCategories.map(cat => (
                                                        <CompactSelector 
                                                            key={cat.id}
                                                            label={cat.label}
                                                            categoryId={cat.id}
                                                            levels={cat.levels}
                                                            value={classData[student][cat.id]}
                                                            optionsMap={(customBank[`${subject}::Global`]?.[cat.id]) || {}}
                                                            onAddComment={(cid, lvl, txt) => handleAddCommentToDB(cid, lvl, txt)}
                                                            onChange={(val) => updateStudentData(student, cat.id, val)}
                                                        />
                                                    ))}
                                                </div>

                                                {/* Individual Student Footer */}
                                                <div className="bg-slate-50 p-4 border-t rounded-b-[22px] flex justify-end">
                                                    <div className="flex items-center gap-2 text-slate-400">
                                                        <Check className="w-4 h-4"/>
                                                        <span className="text-[10px] font-bold uppercase italic">Data synced to shared bank</span>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Simple Bottom Bar for Setup */}
                    {!isSetup && (
                        <div className="fixed bottom-0 left-0 right-0 bg-white border-t p-4 z-40 flex justify-center">
                            <button 
                                onClick={() => { if(confirm("Start over? Session data will be lost.")) window.location.reload(); }}
                                className="flex items-center gap-2 text-red-500 font-black text-xs uppercase tracking-widest"
                            >
                                <RotateCcw className="w-4 h-4"/> Reset Session
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
